<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Audio -->
    <audio id="bg-music" loop>
        <!-- Menggunakan musik instrumental romantis royalty-free sebagai contoh -->
        <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_24e941f1f9.mp3?filename=romantic-piano-122393.mp3" type="audio/mpeg">
    </audio>

    <div class="music-control">
        <button id="music-btn" title="Play/Pause Music">🎵</button>
    </div>

    <!-- Scene 1: Envelope -->
    <div id="scene-1" class="scene active">
        <div class="envelope-wrapper">
            <div class="envelope" id="envelope">
                <div class="flap"></div>
                <div class="letter">
                    <p>Buka 💌</p>
                </div>
                <div class="front"></div>
                <div class="envelope-text">Untukmu ❤️</div>
            </div>
            <div class="sparkles" id="sparkles"></div>
        </div>
    </div>

    <!-- Transition overlay -->
    <div id="transition-overlay" class="overlay"></div>

    <!-- Scene 2: Scrapbook -->
    <div id="scene-2" class="scene">
        <div class="scrapbook-container">
            <!-- Stickers -->
            <div class="sticker sticker-1">Love</div>
            <div class="sticker sticker-2">Forever</div>
            <div class="sticker sticker-3">My Favorite Person</div>

            <!-- Hearts -->
            <div class="floating-hearts">
                <!-- Generated by JS -->
            </div>

            <!-- Title -->
            <h1 class="title">Happy Birthday 🎉</h1>

            <!-- Photos -->
            <div class="gallery">
                <div class="polaroid" style="--rotation: -5deg;">
                    <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=400&h=400&auto=format&fit=crop" alt="Photo 1">
                </div>
                <div class="polaroid" style="--rotation: 3deg;">
                    <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=400&h=400&auto=format&fit=crop" alt="Photo 2">
                </div>
                <div class="polaroid" style="--rotation: -2deg;">
                    <img src="https://images.unsplash.com/photo-1494774157365-9e04c6720e47?q=80&w=400&h=400&auto=format&fit=crop" alt="Photo 3">
                </div>
                <div class="polaroid" style="--rotation: 4deg;">
                    <img src="https://images.unsplash.com/photo-1474552226712-ac0f0961a954?q=80&w=400&h=400&auto=format&fit=crop" alt="Photo 4">
                </div>
            </div>

            <!-- Message -->
            <div class="message-container">
                <p id="typing-text"></p>
            </div>

            <!-- Button -->
            <button id="open-modal-btn" class="btn">Klik ini 💌</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Untuk Kamu yang Spesial</h2>
            <p>Terima kasih sudah menjadi bagian terindah dalam hidupku. Semoga semua yang kamu semogakan segera terwujud. I love you more than words can say. ❤️</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
